name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 22 ships npm 10.x.
      - name: Upgrade npm (for OIDC trusted publishing)
        run: npm install -g npm@latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build

      # Publishes via OIDC trusted publishing — configured on npmjs.com for this
      # repo + workflow, so there is NO NPM_TOKEN secret. The id-token: write
      # permission (above) lets the job mint the short-lived OIDC token npm
      # verifies. --provenance is kept explicitly (required in practice even
      # though trusted publishing is documented to add provenance automatically).
      - name: Publish to npm
        run: npm publish --provenance --access public
